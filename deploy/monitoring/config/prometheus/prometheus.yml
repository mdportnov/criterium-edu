global:
  scrape_interval: 10s
  evaluation_interval: 10s

rule_files:
  - "rules.yml"

scrape_configs:
  - job_name: "node-exporter"
    scrape_interval: 5s
    static_configs:
      - targets: [ "node-exporter:9100" ]
        labels:
          type: infrastructure
          project: "$PROJECT_NAME"

  - job_name: "cadvisor"
    scrape_interval: 5s
    static_configs:
      - targets: [ "cadvisor:8080" ]
        labels:
          type: infrastructure
          project: "$PROJECT_NAME"