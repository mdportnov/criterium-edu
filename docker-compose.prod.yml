services:
  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: criterium-postgres
    env_file:
      - .env.production
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-criterium}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - /var/www/criterium/data/pg:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - criterium-network

  # Backend API Service
  backend:
    image: ghcr.io/mdportnov/criterium-edu-backend:latest
    container_name: criterium-edu-backend
    env_file:
      - .env.production
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-criterium}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key}
      PORT: ${BACKEND_PORT:-3000}
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - criterium-network

  # Frontend Web Service
  frontend:
    image: ghcr.io/mdportnov/criterium-edu-frontend:latest
    container_name: criterium-edu-frontend
    env_file:
      - .env.production
    ports:
      - "80:80"
    restart: always
    networks:
      - criterium-network


  ## Monitoring
  node-exporter:
    image: prom/node-exporter:v1.3.1
    env_file: ./deploy/env/.env.monitoring
    command:
      - --path.procfs=/host/proc
      - --path.rootfs=/rootfs
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    network_mode: "host"
    restart: on-failure
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    logging:
      options:
        max-size: 10m

  promtail:
    image: ghcr.io/mdportnov/criterium-edu-promtail:latest
    user: "0:0"
    env_file: ./deploy/env/.env.monitoring
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/log:/var/log:ro
      - ./deploy/monitoring/config/promtail/promtail.yml:/etc/promtail/orig.yml
    networks:
      - criterium-network
    restart: on-failure
    logging:
      options:
        max-size: 10m

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.46.0
    env_file: ./deploy/env/.env.monitoring
    privileged: true
    network_mode: "host"
    restart: always
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    labels:
      org.label-schema.group: "monitoring"
    logging:
      options:
        max-size: 10m

networks:
  criterium-network:
    driver: bridge
    attachable: true