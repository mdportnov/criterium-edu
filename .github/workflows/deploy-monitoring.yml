name: Deploy Monitoring

on:
  push:
    branches: [ master ]
    paths:
      - 'apps/web-ui/**'
      - 'libs/**'
      - '.github/workflows/deploy-monitoring.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      packages: write

    env:
      PROMTAIL_IMAGE_NAME: criterium-edu-promtail
      REGISTRY: ghcr.io
      PROJECT_NAME: criterium

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v3

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v2

      - name: "Log in to GitHub Container Registry"
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Build and push Promtail Docker image"
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./deploy/monitoring/build/runPromtail.Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.PROMTAIL_IMAGE_NAME }}:${{ github.sha }},${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.PROMTAIL_IMAGE_NAME }}:latest

      - name: "Copy deploy files to server"
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          passphrase: ${{ secrets.PASSPHRASE }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "./deploy, docker-compose.prod.yml"
          target: "~/criterium/"

      - name: "Deploy to server"
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          passphrase: ${{ secrets.PASSPHRASE }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo mkdir -p /var/www/criterium
            sudo chown -R ${{ secrets.SSH_USER }}:${{ secrets.SSH_USER }} /var/www/criterium
            
            sudo cp -r ~/criterium/deploy /var/www/criterium/
            cp -f ~/criterium/docker-compose.prod.yml /var/www/criterium/
            
            cd /var/www/criterium
            
            mkdir -p ./data/pg
            chmod -R 777 ./data
            
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d node-exporter cadvisor promtail
            docker system prune -af
